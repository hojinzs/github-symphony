services:
  symphony-e2e:
    container_name: symphony-e2e
    build:
      context: .
      dockerfile: docker/orchestrator-e2e.Dockerfile
    ports:
      - "4680:4680"
    volumes:
      - ./e2e/fixtures:/e2e/fixtures
    tmpfs:
      - /e2e/work:size=100M,uid=1000,gid=1000,mode=1777
    environment:
      STUB_SCENARIO: ${STUB_SCENARIO:-happy}
